# Bootstrap: create the vault-token secret ONCE manually after cluster creation.
# The ClusterSecretStores need this secret to authenticate to Vault.
# vault-token.yaml ExternalSecret is intentionally absent — it would be circular.
#
#   kubectl create secret generic vault-token \
#     --namespace eso \
#     --from-literal=token=<your-vault-root-token>
#
# After that, ArgoCD syncs both ClusterSecretStores and all ExternalSecrets automatically.
#
# Vault KV v2 engines and secret paths:
#   Engine: argocd   secret: admin        keys: password
#   Engine: tls      secret: argocd       keys: tls.crt, tls.key
#   Engine: tls      secret: grafana      keys: tls.crt, tls.key
#   Engine: tls      secret: vault        keys: tls.crt, tls.key
