# Recreates the vault-token secret in the eso namespace from Vault itself.
# Useful after cluster recreation — once you manually create vault-token once,
# this ExternalSecret keeps it in sync with whatever token is stored in Vault.
#
# Vault path: secret/eso/vault-token   key: token   value: <root-token>
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: vault-token
  namespace: eso
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: vault-cluster-backend
    kind: ClusterSecretStore
  target:
    name: vault-token
    creationPolicy: Owner
  data:
  - secretKey: token
    remoteRef:
      key: eso/vault-token
      property: token
